<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Internes Bus-Navi (Google Maps)</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #222; color: #fff; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #main-content { display: none; }
        #control-panel { padding: 15px; background: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; z-index: 10; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 5px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #00e676; color: black; font-weight: bold; cursor: pointer; }
        #login-screen button { background: #007aff; color: white; width: auto; padding: 12px 40px; font-weight: bold; }
        #login-screen input { width: 280px; text-align: center; background: #333; color: white; border: 1px solid #555; padding: 12px; border-radius: 5px; font-size: 16px; }
        #map-container { position: absolute; top: 180px; bottom: 0; width: 100%; background: #222; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<!-- Passwort-Abfrage beim Start -->
<div id="login-screen">
    <h2>🔒 Bus-Navi Login</h2>
    <p>Bitte Passwort für Fahrer eingeben:</p>
    <input type="password" id="password-input" placeholder="Passwort...">
    <br><br>
    <button onclick="checkPassword()">Anmelden</button>
</div>

<!-- Hauptinhalt -->
<div id="main-content">
    <div id="control-panel">
        <select id="bus-select">
            <option value="" disabled selected>-- Bitte Fahrzeug wählen --</option>
            <option value="bus1" data-h="4.00" data-b="2.55" data-l="14.00" data-g="18">Bus 1 (Doppeldecker) - H: 4.0m</option>
            <option value="bus2" data-h="3.60" data-b="2.50" data-l="12.00" data-g="15">Bus 2 (Standard) - H: 3.6m</option>
        </select>
        <input type="text" id="target-address" placeholder="Zielort oder Adresse eingeben...">
        <button onclick="starteGoogleNavi()">Route in Google Maps öffnen</button>
    </div>
    <div id="map-container">
        <!-- Google Maps Vorschau-Fenster mit Live-Verkehr -->
        <iframe id="google-map" src="https://google.com"></iframe>
    </div>
</div>

<script>
    const MEIN_PASSWORT = "1928";
    let fahrerPosition = null;

    // Funktion zum Verhindern, dass die Seite beim Drücken der Enter-Taste in der Adresszeile neu lädt
    window.addEventListener('keydown', function(e) {
        if(e.keyIdentifier=='U+000A'||e.keyIdentifier=='Enter'||e.keyCode==13) {
            if(e.target.nodeName=='INPUT'&&e.target.type=='text') { e.preventDefault(); return false; }
        }
    }, true);

    function checkPassword() {
        const eingabe = document.getElementById('password-input').value;
        if(eingabe === MEIN_PASSWORT) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            aktiviereStandort();
        } else {
            alert("Falsches Passwort!");
        }
    }

    function aktiviereStandort() {
        navigator.geolocation.watchPosition((pos) => {
            fahrerPosition = pos.coords.latitude + "," + pos.coords.longitude;
            document.getElementById('google-map').src = `https://google.com{fahrerPosition}&t=&z=13&layer=t&ie=UTF8&iwloc=&output=embed`;
        }, (err) => console.log("Hole GPS-Daten..."), { enableHighAccuracy: true });
    }

    function starteGoogleNavi() {
        const e = document.getElementById("bus-select");
        const selectedBus = e.options[e.selectedIndex];
        if(!selectedBus.value) return alert("Bitte zuerst den Bus auswählen!");

        const adresse = document.getElementById('target-address').value;
        if(!adresse) return alert("Bitte Ziel eingeben!");

        const start = fahrerPosition ? fahrerPosition : "Ingolstadt";

        // Öffnet die offizielle Google Maps Navigation
        const googleIntentUrl = `https://google.com{encodeURIComponent(start)}&destination=${encodeURIComponent(adresse)}&travelmode=driving`;
        
        window.open(googleIntentUrl, '_blank');
    }
</script>
</body>
</html>
