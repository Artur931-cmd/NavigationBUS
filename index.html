<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Internes Bus-Navi</title>
    <!-- Nutzung der unblockierbaren Leaflet-Kartenbibliothek -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #222; color: #fff; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #main-content { display: none; }
        #control-panel { padding: 15px; background: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; z-index: 10; }
        select, input, button { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 5px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #00e676; color: black; font-weight: bold; cursor: pointer; }
        #login-screen button { background: #007aff; color: white; width: auto; padding: 12px 40px; border-radius: 5px; border: none; font-size: 16px; font-weight: bold; }
        #login-screen input { width: 280px; text-align: center; background: #333; color: white; border: 1px solid #555; padding: 12px; border-radius: 5px; font-size: 16px; }
        #map { position: absolute; top: 180px; bottom: 0; width: 100%; z-index: 1; }
        #visual-alert { display: none; background: red; color: white; text-align: center; padding: 10px; font-weight: bold; font-size: 18px; position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 999; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<!-- Passwort-Abfrage beim Start -->
<div id="login-screen">
    <h2>🔒 Bus-Navi Login</h2>
    <p>Bitte Passwort für Fahrer eingeben:</p>
    <input type="password" id="password-input" placeholder="Passwort...">
    <br><br>
    <button onclick="checkPassword()">Anmelden</button>
</div>

<!-- Hauptinhalt (Erst nach Login sichtbar) -->
<div id="main-content">
    <div id="control-panel">
        <select id="bus-select">
            <option value="" disabled selected>-- Bitte Fahrzeug wählen --</option>
            <option value="bus1" data-h="4.00" data-b="2.55" data-l="14.00" data-g="18">Bus 1 (Doppeldecker) - H: 4.0m</option>
            <option value="bus2" data-h="3.60" data-b="2.50" data-l="12.00" data-g="15">Bus 2 (Standard) - H: 3.6m</option>
        </select>
        <input type="text" id="target-address" placeholder="Zielort oder Adresse eingeben...">
        <button onclick="sucheUndNavigiere()">Route optisch berechnen</button>
    </div>
    <div id="visual-alert" onclick="recalculateRoute()">⚠️ ROUTE VERLASSEN! Hier tippen zum Neu-Berechnen</div>
    <div id="map"></div>
</div>

<script>
    const MEIN_PASSWORT = "1928";

    function checkPassword() {
        const eingabe = document.getElementById('password-input').value;
        if(eingabe === MEIN_PASSWORT) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            initMap(); 
        } else {
            alert("Falsches Passwort!");
        }
    }

    let map, fahrerPosition, zielKoordinaten, routenLinie, routeLayer, busMarker;

    function initMap() {
        // Initialisierung der unblockierbaren Leaflet-Karte (Startpunkt voreingestellt auf Deutschland Zentrum)
        map = L.map('map').setView([48.137, 11.576], 10);

        // Laden der freien OpenStreetMap-Kartenbilder
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // GPS aktivieren
        navigator.geolocation.watchPosition((pos) => {
            fahrerPosition = [pos.coords.latitude, pos.coords.longitude]; // Format: [Lat, Lon]
            
            if (busMarker) {
                busMarker.setLatLng(fahrerPosition);
            } else {
                busMarker = L.circleMarker(fahrerPosition, { radius: 10, color: '#007aff', fillColor: '#007aff', fillOpacity: 0.8 }).addTo(map);
            }
            if(routenLinie) { pruefeRoutenAbweichung(fahrerPosition); }
        }, (err) => console.log("GPS wird gesucht..."), { enableHighAccuracy: true });

        // Erzwingt die korrekte Anpassung an jede Displaygröße beim ersten Laden
        setTimeout(() => { map.invalidateSize(); }, 500);
    }

    function sucheUndNavigiere() {
        const adresse = document.getElementById('target-address').value;
        if(!adresse) return alert("Bitte Ziel eingeben!");
        
        fetch(`https://openstreetmap.org{encodeURIComponent(adresse)}&limit=1`)
        .then(res => res.json())
        .then(data => {
            if(!data || data.length === 0) return alert("Adresse nicht gefunden!");
            
            // Abspeichern im Leaflet Format: [Lat, Lon]
            zielKoordinaten = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
            berechneBusRoute();
        }).catch(err => alert("Fehler bei der Adresssuche: " + err));
    }

    function berechneBusRoute() {
        const e = document.getElementById("bus-select");
        const selectedBus = e.options[e.selectedIndex];
        if(!selectedBus.value) return alert("Bitte zuerst den Bus auswählen!");
        if(!zielKoordinaten) return alert("Bitte ein Ziel eingeben!");

        // Startpunkt, falls drinnen kein GPS da ist (München/Ingolstadt Bereich)
        const start = fahrerPosition ? fahrerPosition : [48.1371, 11.5762];

        // OSRM-Server verlangt zwingend die Reihenfolge in der URL: Lon,Lat;Lon,Lat
        const url = `https://project-osrm.org{start[1]},${start[0]};${zielKoordinaten[1]},${zielKoordinaten[0]}?geometries=geojson`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            if(!data.routes || data.routes.length === 0) return alert("Keine Route gefunden!");
            
            // Konvertiert das empfangene OSRM-Format [Lon, Lat] zurück in das Leaflet-Format [Lat, Lon]
            const coordsOSRM = data.routes[0].geometry.coordinates;
            routenLinie = coordsOSRM.map(coord => [coord[1], coord[0]]);

            if (routeLayer) { map.removeLayer(routeLayer); }

            routeLayer = L.polyline(routenLinie, { color: '#00e676', weight: 6 }).addTo(map);
            
            // Passt das Display an, sodass Start und Ziel komplett sichtbar sind
            const bounds = L.latLngBounds([start, zielKoordinaten]);
            map.fitBounds(bounds, { padding: [30, 30] });
        }).catch(err => alert("Fehler beim Routenserver: " + err));
    }

    function pruefeRoutenAbweichung(pos) {
        if(!routenLinie) return;
        let nahGenug = false;
        for(let i=0; i < routenLinie.length; i++) {
            let dX = routenLinie[i][0] - pos[0];
            let dY = routenLinie[i][1] - pos[1];
            let distanz = Math.sqrt(dX*dX + dY*dY);
            if(distanz < 0.001) { nahGenug = true; break; }
        }
        if(!nahGenug) {
            if (routeLayer) routeLayer.setStyle({ color: '#ff1744' });
            document.getElementById('visual-alert').style.display = 'block';
        } else {
            if (routeLayer) routeLayer.setStyle({ color: '#00e676' });
            document.getElementById('visual-alert').style.display = 'none';
        }
    }

    function recalculateRoute() {
        document.getElementById('visual-alert').style.display = 'none';
        if(zielKoordinaten) berechneBusRoute(); 
    }
</script>
</body>
</html>
